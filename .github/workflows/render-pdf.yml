name: Render PDF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render PDF
        uses: docker://pandoc/extra:latest
        with:
          args: >-
            math_exercises.md
            -o math_exercises.pdf
            --pdf-engine=pdflatex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: math-exercises-pdf
          path: math_exercises.pdf
