name: Render PDF

on:
  push:
    branches: [ main, math-exercises-pdf-16831532306416782251 ]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate No Solution MD
        run: python3 scripts/generate_no_solution.py

      - name: Render PDF (With Solutions)
        uses: docker://pandoc/extra:latest
        with:
          args: >-
            LEKTION1_AUFGABEN_MIT_LOESUNG.md
            LEKTION2_AUFGABEN_MIT_LOESUNG.md
            LEKTION3_ASSOZIATIV_MIT_LOESUNG.md
            LEKTION4_DISSOZIATIV_MIT_LOESUNG.md
            LEKTION5_LOGIK_MIT_LOESUNG.md
            LEKTION7_AUFGABEN_MIT_LOESUNG.md
            -o MATHE_AUFGABEN_MIT_LOESUNG.pdf
            --pdf-engine=pdflatex
            -V papersize=a4

      - name: Render PDF (No Solutions)
        uses: docker://pandoc/extra:latest
        with:
          args: >-
            LEKTION1_AUFGABEN.md
            LEKTION2_AUFGABEN.md
            LEKTION3_ASSOZIATIV.md
            LEKTION4_DISSOZIATIV.md
            LEKTION5_LOGIK.md
            LEKTION7_AUFGABEN.md
            -o MATHE_AUFGABEN.pdf
            --pdf-engine=pdflatex
            -V papersize=a4

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: math-exercises-pdfs
          path: |
            MATHE_AUFGABEN_MIT_LOESUNG.pdf
            MATHE_AUFGABEN.pdf

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            MATHE_AUFGABEN_MIT_LOESUNG.pdf
            MATHE_AUFGABEN.pdf
